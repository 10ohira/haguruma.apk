<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="big" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f86e3"/>
      <stop offset="1" stop-color="#2a5db8"/>
    </linearGradient>
    <linearGradient id="small" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0b94a"/>
      <stop offset="1" stop-color="#c88a1a"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="38" fill="#f4ede0"/>
  <!-- big blue gear -->
  <g transform="translate(72 78)" fill="url(#big)">
    <circle cx="0" cy="0" r="48"/>
    <g>
      <rect x="-7" y="-66" width="14" height="22" rx="3"/>
      <rect x="-7" y="44" width="14" height="22" rx="3"/>
      <rect x="-66" y="-7" width="22" height="14" rx="3"/>
      <rect x="44" y="-7" width="22" height="14" rx="3"/>
      <g transform="rotate(45)">
        <rect x="-7" y="-66" width="14" height="22" rx="3"/>
        <rect x="-7" y="44" width="14" height="22" rx="3"/>
        <rect x="-66" y="-7" width="22" height="14" rx="3"/>
        <rect x="44" y="-7" width="22" height="14" rx="3"/>
      </g>
    </g>
  </g>
  <circle cx="72" cy="78" r="22" fill="#fbf6ec"/>
  <!-- small yellow gear (intermeshing) -->
  <g transform="translate(140 130)" fill="url(#small)">
    <circle cx="0" cy="0" r="28"/>
    <g>
      <rect x="-4" y="-38" width="8" height="13" rx="2"/>
      <rect x="-4" y="25" width="8" height="13" rx="2"/>
      <rect x="-38" y="-4" width="13" height="8" rx="2"/>
      <rect x="25" y="-4" width="13" height="8" rx="2"/>
      <g transform="rotate(45)">
        <rect x="-4" y="-38" width="8" height="13" rx="2"/>
        <rect x="-4" y="25" width="8" height="13" rx="2"/>
        <rect x="-38" y="-4" width="13" height="8" rx="2"/>
        <rect x="25" y="-4" width="13" height="8" rx="2"/>
      </g>
    </g>
  </g>
  <circle cx="140" cy="130" r="11" fill="#fbf6ec"/>
</svg>
